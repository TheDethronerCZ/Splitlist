async function checkAdmin() {

  const { data: { user } } = await supabase.auth.getUser()

  // not logged in
  if (!user) {
    document.body.innerHTML = "Not logged in"
    return
  }

  // YOUR admin email
  if (user.email !== "heraij@game.local") {
    document.body.innerHTML = "Access denied"
    return
  }

  // allowed
  loadAdminPanel()
}

function loadAdminPanel() {
  document.body.innerHTML = `
    <h1>Admin Panel</h1>
    <p>Welcome admin.</p>
  `
}

checkAdmin()
async function loadSubmissions() {

  const { data } = await supabase
    .from("submissions")
    .select("*")
    .eq("status", "pending")

  const container = document.getElementById("submissions")
  container.innerHTML = ""

  data.forEach(s => {

    const div = document.createElement("div")

    div.innerHTML = `
      <hr>
      <p><b>User:</b> ${s.username}</p>
      <p><b>Video:</b> <a href="${s.video}" target="_blank">open</a></p>
      <p><b>Level ID:</b> ${s.levelid}</p>
      <p><b>Creator:</b> ${s.creator}</p>

      <button onclick="approveSubmission('${s.id}')">
        Approve
      </button>

      <button onclick="rejectSubmission('${s.id}')">
        Reject
      </button>
    `

    container.appendChild(div)
  })
}
async function approveSubmission(id) {

  await supabase
    .from("submissions")
    .update({ status: "approved" })
    .eq("id", id)

  loadSubmissions()
}
async function rejectSubmission(id) {

  await supabase
    .from("submissions")
    .update({ status: "rejected" })
    .eq("id", id)

  loadSubmissions()
}
</script>
